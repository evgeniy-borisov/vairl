<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:0.8" />
    </linearGradient>
    <filter id="agentGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Competency pyramid (foundation ’ mastery) -->
  <g transform="translate(120, 80)">
    <polygon points="200,0 40,320 360,320" fill="url(#agentGrad)" opacity="0.08"/>
    <line x1="200" y1="40" x2="80" y2="280" stroke="url(#agentGrad)" stroke-width="2" opacity="0.35"/>
    <line x1="200" y1="40" x2="320" y2="280" stroke="url(#agentGrad)" stroke-width="2" opacity="0.35"/>
    <line x1="80" y1="200" x2="320" y2="200" stroke="url(#agentGrad)" stroke-width="2" opacity="0.25"/>
    <line x1="110" y1="120" x2="290" y2="120" stroke="url(#agentGrad)" stroke-width="2" opacity="0.25"/>
    <rect x="155" y="250" width="90" height="28" fill="url(#agentGrad)" opacity="0.5" rx="6"/>
    <rect x="130" y="195" width="140" height="28" fill="url(#agentGrad)" opacity="0.65" rx="6"/>
    <rect x="105" y="140" width="190" height="28" fill="url(#agentGrad)" opacity="0.8" rx="6"/>
    <rect x="80" y="85" width="240" height="28" fill="url(#agentGrad)" opacity="0.95" rx="6"/>
    <circle cx="200" cy="30" r="22" fill="url(#agentGrad)" filter="url(#agentGlow)"/>
  </g>

  <!-- Central agent hub: orchestrator -->
  <g transform="translate(520, 200)">
    <circle cx="0" cy="0" r="55" fill="url(#agentGrad)" opacity="0.25"/>
    <circle cx="0" cy="0" r="38" fill="url(#agentGrad)" opacity="0.9" filter="url(#agentGlow)"/>
    <circle cx="-120" cy="-60" r="28" fill="url(#agentGrad)" opacity="0.75"/>
    <circle cx="120" cy="-60" r="28" fill="url(#agentGrad2)" opacity="0.75"/>
    <circle cx="-140" cy="80" r="28" fill="url(#agentGrad2)" opacity="0.75"/>
    <circle cx="140" cy="80" r="28" fill="url(#agentGrad)" opacity="0.75"/>
    <circle cx="0" cy="150" r="28" fill="url(#agentGrad2)" opacity="0.85"/>
    <g stroke="url(#agentGrad)" stroke-width="2.5" opacity="0.4">
      <line x1="-32" y1="-20" x2="-92" y2="-45"/>
      <line x1="32" y1="-20" x2="92" y2="-45"/>
      <line x1="-35" y1="25" x2="-112" y2="65"/>
      <line x1="35" y1="25" x2="112" y2="65"/>
      <line x1="0" y1="38" x2="0" y2="122"/>
    </g>
  </g>

  <!-- DAG workflow spine -->
  <g transform="translate(780, 120)">
    <rect x="0" y="0" width="70" height="36" fill="url(#agentGrad)" opacity="0.6" rx="8"/>
    <rect x="100" y="0" width="70" height="36" fill="url(#agentGrad)" opacity="0.7" rx="8"/>
    <rect x="200" y="0" width="70" height="36" fill="url(#agentGrad)" opacity="0.8" rx="8"/>
    <rect x="300" y="0" width="70" height="36" fill="url(#agentGrad)" opacity="0.9" rx="8"/>
    <rect x="100" y="80" width="70" height="36" fill="url(#agentGrad2)" opacity="0.7" rx="8"/>
    <rect x="200" y="80" width="70" height="36" fill="url(#agentGrad2)" opacity="0.85" rx="8"/>
    <rect x="150" y="170" width="70" height="36" fill="url(#agentGrad)" opacity="1" rx="8" filter="url(#agentGlow)"/>
    <g stroke="url(#agentGrad)" stroke-width="2" opacity="0.45" fill="none">
      <path d="M 70 18 L 100 18"/>
      <path d="M 170 18 L 200 18"/>
      <path d="M 270 18 L 300 18"/>
      <path d="M 35 36 L 35 60 L 135 60 L 135 80"/>
      <path d="M 235 36 L 235 60 L 185 60 L 185 80"/>
      <path d="M 135 116 L 135 140 L 185 140 L 185 170"/>
      <path d="M 235 116 L 235 140 L 185 140"/>
    </g>
  </g>

  <!-- FSM states -->
  <g transform="translate(820, 380)">
    <circle cx="0" cy="0" r="32" fill="url(#agentGrad2)" opacity="0.6"/>
    <circle cx="120" cy="0" r="32" fill="url(#agentGrad)" opacity="0.75"/>
    <circle cx="240" cy="0" r="32" fill="url(#agentGrad)" opacity="0.85"/>
    <circle cx="120" cy="100" r="32" fill="url(#agentGrad2)" opacity="0.7"/>
    <g stroke="url(#agentGrad)" stroke-width="2.5" opacity="0.5" fill="none">
      <path d="M 32 0 L 88 0" marker-end="url(#arrow)"/>
      <path d="M 152 0 L 208 0"/>
      <path d="M 120 32 L 120 68"/>
      <path d="M 208 20 Q 260 50 152 85"/>
      <path d="M 88 85 Q 30 50 32 20"/>
    </g>
  </g>

  <!-- Behavior tree hierarchy -->
  <g transform="translate(180, 430)">
    <rect x="280" y="0" width="100" height="32" fill="url(#agentGrad)" opacity="0.7" rx="6"/>
    <rect x="180" y="70" width="80" height="28" fill="url(#agentGrad2)" opacity="0.65" rx="6"/>
    <rect x="400" y="70" width="80" height="28" fill="url(#agentGrad2)" opacity="0.65" rx="6"/>
    <rect x="120" y="140" width="60" height="24" fill="url(#agentGrad)" opacity="0.55" rx="5"/>
    <rect x="220" y="140" width="60" height="24" fill="url(#agentGrad)" opacity="0.55" rx="5"/>
    <rect x="380" y="140" width="60" height="24" fill="url(#agentGrad)" opacity="0.55" rx="5"/>
    <rect x="480" y="140" width="60" height="24" fill="url(#agentGrad)" opacity="0.55" rx="5"/>
    <g stroke="url(#agentGrad)" stroke-width="2" opacity="0.35">
      <line x1="330" y1="32" x2="220" y2="70"/>
      <line x1="330" y1="32" x2="440" y2="70"/>
      <line x1="220" y1="98" x2="150" y2="140"/>
      <line x1="220" y1="98" x2="250" y2="140"/>
      <line x1="440" y1="98" x2="410" y2="140"/>
      <line x1="440" y1="98" x2="510" y2="140"/>
    </g>
  </g>

  <!-- Eval / metrics sparkline -->
  <g transform="translate(100, 520)">
    <path d="M 0 30 L 80 25 L 160 18 L 240 12 L 320 8 L 400 5 L 480 3 L 560 2"
          stroke="url(#agentGrad2)" stroke-width="4" fill="none" opacity="0.85"/>
    <circle cx="560" cy="2" r="7" fill="url(#agentGrad2)" filter="url(#agentGlow)"/>
  </g>
</svg>
