<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aaG1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a148c"/>
      <stop offset="100%" style="stop-color:#7b1fa2"/>
    </linearGradient>
    <linearGradient id="aaG2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#42a5f5"/>
    </linearGradient>
    <linearGradient id="aaG3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e65100"/>
      <stop offset="100%" style="stop-color:#ff9800"/>
    </linearGradient>
    <filter id="aaGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#faf8ff"/>

  <!-- Elasticsearch -->
  <g transform="translate(80, 200)" filter="url(#aaGlow)">
    <rect x="0" y="0" width="200" height="120" rx="12" fill="url(#aaG2)" opacity="0.92"/>
    <text x="100" y="45" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="15" font-weight="700">Elasticsearch</text>
    <text x="100" y="68" text-anchor="middle" fill="#bbdefb" font-family="system-ui,sans-serif" font-size="12">Downloads index</text>
    <text x="100" y="92" text-anchor="middle" fill="#e3f2fd" font-family="system-ui,sans-serif" font-size="11">aarecord À MD5 À ISBN</text>
  </g>

  <!-- MariaDB -->
  <g transform="translate(80, 380)" filter="url(#aaGlow)">
    <rect x="0" y="0" width="200" height="100" rx="12" fill="url(#aaG1)" opacity="0.88"/>
    <text x="100" y="42" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="15" font-weight="700">MariaDB</text>
    <text x="100" y="65" text-anchor="middle" fill="#e1bee7" font-family="system-ui,sans-serif" font-size="12">AAC offsets À persist</text>
  </g>

  <!-- AAC files -->
  <g transform="translate(920, 200)" filter="url(#aaGlow)">
    <rect x="0" y="0" width="200" height="280" rx="12" fill="url(#aaG3)" opacity="0.9"/>
    <text x="100" y="45" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="15" font-weight="700">AAC folders</text>
    <text x="100" y="72" text-anchor="middle" fill="#ffe0b2" font-family="system-ui,sans-serif" font-size="11">annas_archive_data__*</text>
    <text x="100" y="110" text-anchor="middle" fill="#fff3e0" font-family="system-ui,sans-serif" font-size="11">zlib3_files</text>
    <text x="100" y="135" text-anchor="middle" fill="#fff3e0" font-family="system-ui,sans-serif" font-size="11">duxiu_files</text>
    <text x="100" y="160" text-anchor="middle" fill="#fff3e0" font-family="system-ui,sans-serif" font-size="11">ia2_acsmpdf_files</text>
    <text x="100" y="200" text-anchor="middle" fill="#ffe0b2" font-family="system-ui,sans-serif" font-size="10">+ meta .jsonl.zst</text>
    <text x="100" y="240" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="11">BitTorrent ~1.1 PB</text>
  </g>

  <!-- Flask web -->
  <g transform="translate(440, 240)" filter="url(#aaGlow)">
    <circle cx="80" cy="75" r="70" fill="url(#aaG1)" opacity="0.15"/>
    <circle cx="80" cy="75" r="55" fill="url(#aaG1)" opacity="0.92"/>
    <text x="80" y="68" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Anna's</text>
    <text x="80" y="88" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Archive</text>
    <text x="80" y="108" text-anchor="middle" fill="#e1bee7" font-family="system-ui,sans-serif" font-size="10">Flask À CC0</text>
  </g>

  <!-- Arrows -->
  <g stroke="#9e9e9e" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="280" y1="260" x2="430" y2="290"/>
    <line x1="280" y1="420" x2="430" y2="340"/>
    <line x1="600" y1="290" x2="910" y2="320"/>
    <line x1="600" y1="340" x2="910" y2="380"/>
  </g>

  <!-- Sources -->
  <g transform="translate(380, 480)" font-family="system-ui,sans-serif" font-size="11" fill="#616161">
    <text x="0" y="0" text-anchor="middle">LibGen À Z-Library À Sci-Hub À IA À DuXiu À Open Library</text>
  </g>

  <text x="600" y="55" text-anchor="middle" fill="#4a148c" font-family="system-ui,sans-serif" font-size="28" font-weight="700">Anna's Archive  <5B0?>8A:</text>
  <text x="600" y="90" text-anchor="middle" fill="#757575" font-family="system-ui,sans-serif" font-size="16">Elasticsearch + MariaDB + AAC + B>@@5=BK</text>
</svg>
