<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cpGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <filter id="cpGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Central hub (operations room) -->
  <rect x="520" y="250" width="160" height="100" fill="url(#cpGrad)" opacity="0.85" rx="12" filter="url(#cpGlow)"/>
  <rect x="540" y="275" width="120" height="8" fill="#fff" opacity="0.4" rx="2"/>
  <rect x="540" y="295" width="90" height="8" fill="#fff" opacity="0.3" rx="2"/>
  <rect x="540" y="315" width="100" height="8" fill="#fff" opacity="0.35" rx="2"/>

  <!-- Network nodes -->
  <circle cx="200" cy="180" r="28" fill="url(#cpGrad)" opacity="0.75"/>
  <circle cx="180" cy="420" r="24" fill="url(#cpGrad)" opacity="0.65"/>
  <circle cx="1020" cy="200" r="26" fill="url(#cpGrad2)" opacity="0.8"/>
  <circle cx="1000" cy="430" r="22" fill="url(#cpGrad2)" opacity="0.7"/>
  <circle cx="600" cy="80" r="20" fill="url(#cpGrad)" opacity="0.6"/>
  <circle cx="600" cy="530" r="20" fill="url(#cpGrad)" opacity="0.6"/>

  <!-- Links -->
  <g stroke="url(#cpGrad)" stroke-width="2" opacity="0.35">
    <line x1="228" y1="195" x2="520" y2="290"/>
    <line x1="204" y1="405" x2="520" y2="320"/>
    <line x1="994" y1="215" x2="680" y2="290"/>
    <line x1="990" y1="415" x2="680" y2="310"/>
    <line x1="600" y1="100" x2="600" y2="250"/>
    <line x1="600" y1="350" x2="600" y2="510"/>
    <line x1="228" y1="180" x2="994" y2="200" stroke-dasharray="6 4"/>
  </g>

  <!-- Telex / flow arrows -->
  <polygon points="380,300 400,290 400,310" fill="#fa709a" opacity="0.7"/>
  <polygon points="820,300 800,290 800,310" fill="#fa709a" opacity="0.7"/>

  <!-- Labels -->
  <text x="200" y="185" text-anchor="middle" fill="white" font-size="9" font-family="monospace">A!#</text>
  <text x="1020" y="205" text-anchor="middle" fill="white" font-size="9" font-family="monospace">VSM</text>
  <text x="600" y="305" text-anchor="middle" fill="white" font-size="10" font-family="system-ui" font-weight="600">OPS</text>

  <text x="600" y="580" text-anchor="middle" fill="#667eea" font-size="14" font-family="system-ui, sans-serif" opacity="0.55">OGAS · Cybersyn · OR · agent swarms</text>
</svg>
