<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mhBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="mhMoon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#c3cfe2"/>
    </linearGradient>
    <linearGradient id="mhCode" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#mhBg)"/>
  <!-- stars -->
  <circle cx="120" cy="80" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="980" cy="120" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="850" cy="60" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="300" cy="140" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="1050" cy="200" r="1.5" fill="#fff" opacity="0.5"/>
  <!-- moon -->
  <circle cx="900" cy="320" r="110" fill="url(#mhMoon)" opacity="0.9"/>
  <circle cx="940" cy="290" r="95" fill="url(#mhBg)" opacity="0.85"/>
  <!-- AGC / code stack -->
  <g transform="translate(140, 180)">
    <rect x="0" y="0" width="520" height="280" rx="12" fill="#1a1a2e" stroke="#667eea" stroke-width="2" opacity="0.95"/>
    <text x="24" y="42" fill="#667eea" font-family="monospace" font-size="22" font-weight="bold">AGC FLIGHT SOFTWARE</text>
    <text x="24" y="78" fill="#43e97b" font-family="monospace" font-size="16">TCB     PRIORITY DISPLAYS</text>
    <text x="24" y="108" fill="#a0aec0" font-family="monospace" font-size="15">RESTART / ERROR RECOVERY</text>
    <text x="24" y="148" fill="#38f9d7" font-family="monospace" font-size="14">INTERPRETIVE  +  ASSEMBLY</text>
    <text x="24" y="178" fill="#a0aec0" font-family="monospace" font-size="14">ROPE MEMORY  ’  VERIFIED</text>
    <rect x="24" y="200" width="460" height="8" rx="4" fill="#2d3748"/>
    <rect x="24" y="200" width="380" height="8" rx="4" fill="url(#mhCode)"/>
    <text x="24" y="248" fill="#667eea" font-family="sans-serif" font-size="18">Margaret Hamilton · Software Engineering</text>
    <text x="24" y="272" fill="#718096" font-family="sans-serif" font-size="15">Apollo · USL · Development Before The Fact</text>
  </g>
  <!-- rope memory hint -->
  <g transform="translate(680, 420)" opacity="0.7">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#764ba2" stroke-width="3"/>
    <line x1="0" y1="12" x2="80" y2="12" stroke="#667eea" stroke-width="3"/>
    <line x1="0" y1="24" x2="80" y2="24" stroke="#43e97b" stroke-width="3"/>
    <text x="90" y="18" fill="#a0aec0" font-family="sans-serif" font-size="13">core rope</text>
  </g>
</svg>
