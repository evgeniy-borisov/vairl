<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="catGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="nnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="monoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#667eea"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Category: objects A, B, C -->
  <g transform="translate(100, 120)">
    <text x="120" y="0" fill="#a0aec0" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">Category C</text>
    <circle cx="60" cy="80" r="28" fill="none" stroke="url(#catGrad)" stroke-width="2.5"/>
    <text x="60" y="86" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="18" font-weight="600" text-anchor="middle">A</text>
    <circle cx="200" cy="80" r="28" fill="none" stroke="url(#catGrad)" stroke-width="2.5"/>
    <text x="200" y="86" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="18" font-weight="600" text-anchor="middle">B</text>
    <circle cx="130" cy="180" r="28" fill="none" stroke="url(#catGrad)" stroke-width="2.5"/>
    <text x="130" y="186" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="18" font-weight="600" text-anchor="middle">C</text>
    <path d="M 88 80 L 172 80" stroke="url(#catGrad)" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="130" y="68" fill="#718096" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">f</text>
    <path d="M 185 100 L 145 160" stroke="url(#catGrad)" stroke-width="2" opacity="0.7" marker-end="url(#arrow)"/>
    <path d="M 75 100 L 115 160" stroke="url(#catGrad)" stroke-width="2" opacity="0.7" marker-end="url(#arrow)"/>
  </g>

  <!-- Monad M -->
  <g transform="translate(420, 100)">
    <rect x="0" y="0" width="200" height="200" rx="12" fill="none" stroke="url(#monoGrad)" stroke-width="2" opacity="0.6"/>
    <text x="100" y="36" fill="#f093fb" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Monad M</text>
    <text x="100" y="90" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">M(A) ’ A</text>
    <text x="100" y="120" fill="#718096" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">algebra</text>
    <circle cx="100" cy="160" r="22" fill="url(#monoGrad)" opacity="0.35" filter="url(#glow)"/>
    <text x="100" y="166" fill="#fff" font-family="system-ui,sans-serif" font-size="12" font-weight="600" text-anchor="middle">hom</text>
  </g>

  <!-- Neural layers as homomorphisms -->
  <g transform="translate(700, 110)">
    <text x="180" y="0" fill="#a0aec0" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">NN layer f : A ’ B</text>
    <g opacity="0.9">
      <rect x="20" y="40" width="80" height="50" rx="8" fill="url(#nnGrad)" opacity="0.25" stroke="#43e97b" stroke-width="1.5"/>
      <rect x="140" y="40" width="80" height="50" rx="8" fill="url(#nnGrad)" opacity="0.25" stroke="#43e97b" stroke-width="1.5"/>
      <rect x="260" y="40" width="80" height="50" rx="8" fill="url(#nnGrad)" opacity="0.25" stroke="#43e97b" stroke-width="1.5"/>
      <circle cx="60" cy="65" r="8" fill="#43e97b"/>
      <circle cx="180" cy="65" r="8" fill="#43e97b"/>
      <circle cx="300" cy="65" r="8" fill="#43e97b"/>
      <line x1="68" y1="65" x2="172" y2="65" stroke="#38f9d7" stroke-width="2"/>
      <line x1="188" y1="65" x2="292" y2="65" stroke="#38f9d7" stroke-width="2"/>
      <line x1="60" y1="90" x2="60" y2="130" stroke="#667eea" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3"/>
      <line x1="180" y1="90" x2="180" y2="130" stroke="#667eea" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3"/>
      <line x1="300" y1="90" x2="300" y2="130" stroke="#667eea" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3"/>
      <text x="180" y="155" fill="#718096" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">weight tying via 2-cells</text>
    </g>
  </g>

  <!-- Arrows connecting blocks -->
  <path d="M 330 200 Q 375 200 420 200" stroke="#667eea" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 620 200 Q 660 200 700 165" stroke="#43e97b" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Para / Optics strip -->
  <g transform="translate(150, 380)">
    <text x="450" y="0" fill="#a0aec0" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">Para · Optics · Backprop</text>
    <rect x="0" y="20" width="900" height="80" rx="10" fill="none" stroke="#4a5568" stroke-width="1.5"/>
    <rect x="30" y="40" width="120" height="40" rx="6" fill="url(#catGrad)" opacity="0.3"/>
    <text x="90" y="66" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">forward</text>
    <text x="280" y="66" fill="#718096" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle">Ä</text>
    <rect x="410" y="40" width="120" height="40" rx="6" fill="url(#monoGrad)" opacity="0.3"/>
    <text x="470" y="66" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">backward</text>
    <rect x="650" y="40" width="200" height="40" rx="6" fill="url(#nnGrad)" opacity="0.25"/>
    <text x="750" y="66" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">compositional AD</text>
  </g>

  <!-- Title -->
  <text x="600" y="560" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="28" font-weight="700" text-anchor="middle">Categorical Deep Learning</text>
  <text x="600" y="595" fill="#718096" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">algebraic theory of architectures · beyond geometric DL</text>
</svg>
