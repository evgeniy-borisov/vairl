<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rlGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rlGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <filter id="rlGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- PPO side -->
  <rect x="80" y="160" width="100" height="56" fill="url(#rlGrad)" opacity="0.85" rx="10" filter="url(#rlGlow)"/>
  <text x="130" y="195" text-anchor="middle" fill="white" font-size="12" font-family="system-ui">Ŕ PPO</text>
  <rect x="220" y="160" width="100" height="56" fill="url(#rlGrad3)" opacity="0.8" rx="10"/>
  <text x="270" y="195" text-anchor="middle" fill="white" font-size="12" font-family="system-ui">V critic</text>
  <rect x="360" y="160" width="100" height="56" fill="url(#rlGrad2)" opacity="0.75" rx="10"/>
  <text x="410" y="195" text-anchor="middle" fill="white" font-size="12" font-family="system-ui">R reward</text>

  <!-- GRPO side -->
  <rect x="720" y="150" width="110" height="56" fill="url(#rlGrad)" opacity="0.9" rx="10" filter="url(#rlGlow)"/>
  <text x="775" y="185" text-anchor="middle" fill="white" font-size="12" font-family="system-ui">Ŕ GRPO</text>
  <rect x="860" y="150" width="110" height="56" fill="url(#rlGrad2)" opacity="0.8" rx="10"/>
  <text x="915" y="185" text-anchor="middle" fill="white" font-size="12" font-family="system-ui">R / verify</text>

  <!-- Group bars -->
  <g transform="translate(700, 280)">
    <rect x="0" y="80" width="28" height="60" fill="url(#rlGrad3)" opacity="0.5" rx="4"/>
    <rect x="40" y="30" width="28" height="110" fill="url(#rlGrad2)" opacity="0.9" rx="4"/>
    <rect x="80" y="55" width="28" height="85" fill="url(#rlGrad)" opacity="0.6" rx="4"/>
    <rect x="120" y="20" width="28" height="120" fill="url(#rlGrad2)" opacity="1" rx="4" filter="url(#rlGlow)"/>
    <rect x="160" y="70" width="28" height="70" fill="url(#rlGrad3)" opacity="0.55" rx="4"/>
    <rect x="200" y="45" width="28" height="95" fill="url(#rlGrad2)" opacity="0.75" rx="4"/>
    <line x1="-10" y1="75" x2="250" y2="75" stroke="#667eea" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
  </g>

  <text x="600" y="520" text-anchor="middle" fill="#667eea" font-size="15" font-family="system-ui, sans-serif" opacity="0.55">PPO + critic  ·  GRPO + group baseline</text>
</svg>
