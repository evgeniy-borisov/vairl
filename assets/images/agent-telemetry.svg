<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="telGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="telGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="telGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- User -->
  <circle cx="160" cy="280" r="36" fill="url(#telGrad2)" opacity="0.85"/>
  <g stroke="url(#telGrad2)" stroke-width="2" opacity="0.4">
    <line x1="196" y1="280" x2="280" y2="240"/>
    <line x1="196" y1="280" x2="280" y2="280"/>
    <line x1="196" y1="280" x2="280" y2="320"/>
  </g>

  <!-- Agent trace spans -->
  <g transform="translate(300, 200)">
    <rect x="0" y="0" width="200" height="36" fill="url(#telGrad2)" opacity="0.55" rx="8"/>
    <rect x="24" y="52" width="160" height="28" fill="url(#telGrad)" opacity="0.65" rx="6"/>
    <rect x="48" y="96" width="120" height="28" fill="url(#telGrad)" opacity="0.75" rx="6"/>
    <rect x="72" y="140" width="96" height="28" fill="url(#telGrad2)" opacity="0.7" rx="6"/>
    <g stroke="url(#telGrad)" stroke-width="2" opacity="0.35">
      <line x1="100" y1="36" x2="104" y2="52"/>
      <line x1="104" y1="80" x2="108" y2="96"/>
      <line x1="108" y1="124" x2="120" y2="140"/>
    </g>
  </g>

  <!-- Stream to DB -->
  <g transform="translate(560, 230)">
    <path d="M 0 60 Q 80 20 160 60 T 320 60" stroke="url(#telGrad)" stroke-width="3" fill="none" opacity="0.6"/>
    <circle cx="0" cy="60" r="6" fill="url(#telGrad)"/>
    <circle cx="80" cy="35" r="5" fill="url(#telGrad)"/>
    <circle cx="160" cy="60" r="6" fill="url(#telGrad)"/>
    <circle cx="240" cy="35" r="5" fill="url(#telGrad)"/>
    <circle cx="320" cy="60" r="6" fill="url(#telGrad)" filter="url(#telGlow)"/>
  </g>

  <!-- Database -->
  <g transform="translate(900, 200)">
    <ellipse cx="100" cy="28" rx="90" ry="22" fill="url(#telGrad2)" opacity="0.7"/>
    <rect x="10" y="28" width="180" height="120" fill="url(#telGrad2)" opacity="0.35" rx="4"/>
    <ellipse cx="100" cy="148" rx="90" ry="22" fill="url(#telGrad2)" opacity="0.55"/>
    <line x1="10" y1="28" x2="10" y2="148" stroke="url(#telGrad2)" stroke-width="2" opacity="0.5"/>
    <line x1="190" y1="28" x2="190" y2="148" stroke="url(#telGrad2)" stroke-width="2" opacity="0.5"/>
    <g opacity="0.6">
      <rect x="36" y="58" width="128" height="10" fill="url(#telGrad)" rx="3"/>
      <rect x="36" y="78" width="100" height="10" fill="url(#telGrad)" rx="3"/>
      <rect x="36" y="98" width="115" height="10" fill="url(#telGrad)" rx="3"/>
    </g>
  </g>

  <!-- Similarity cluster -->
  <g transform="translate(880, 400)">
    <circle cx="40" cy="40" r="14" fill="url(#telGrad2)" opacity="0.7"/>
    <circle cx="80" cy="28" r="14" fill="url(#telGrad2)" opacity="0.85"/>
    <circle cx="72" cy="68" r="14" fill="url(#telGrad2)" opacity="0.75"/>
    <circle cx="120" cy="48" r="10" fill="url(#telGrad)" opacity="0.5"/>
    <ellipse cx="76" cy="48" rx="52" ry="36" fill="none" stroke="url(#telGrad)" stroke-width="2" opacity="0.45" stroke-dasharray="5,4"/>
  </g>
</svg>
