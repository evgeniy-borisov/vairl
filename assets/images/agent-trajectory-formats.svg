<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="trGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <filter id="trGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Source formats (left) -->
  <g transform="translate(80, 120)">
    <rect x="0" y="0" width="140" height="44" fill="url(#trGrad2)" opacity="0.55" rx="8"/>
    <rect x="0" y="60" width="140" height="44" fill="url(#trGrad2)" opacity="0.65" rx="8"/>
    <rect x="0" y="120" width="140" height="44" fill="url(#trGrad2)" opacity="0.75" rx="8"/>
    <rect x="0" y="180" width="140" height="44" fill="url(#trGrad2)" opacity="0.65" rx="8"/>
    <rect x="0" y="240" width="140" height="44" fill="url(#trGrad2)" opacity="0.55" rx="8"/>
    <rect x="0" y="300" width="140" height="44" fill="url(#trGrad2)" opacity="0.45" rx="8"/>
  </g>

  <!-- Arrows to hub -->
  <g stroke="url(#trGrad)" stroke-width="2" opacity="0.45" fill="none">
    <path d="M 230 142 Q 340 142 400 280"/>
    <path d="M 230 202 Q 340 230 400 280"/>
    <path d="M 230 262 L 400 280"/>
    <path d="M 230 322 Q 340 330 400 280"/>
    <path d="M 230 382 Q 340 370 400 280"/>
    <path d="M 230 442 Q 340 410 400 280"/>
  </g>

  <!-- Central converter hub -->
  <g transform="translate(400, 220)">
    <circle cx="80" cy="60" r="72" fill="url(#trGrad)" opacity="0.25"/>
    <circle cx="80" cy="60" r="52" fill="url(#trGrad)" opacity="0.55" filter="url(#trGlow)"/>
    <g transform="translate(52, 36)">
      <rect x="0" y="0" width="56" height="8" fill="white" opacity="0.7" rx="2"/>
      <rect x="8" y="14" width="40" height="8" fill="white" opacity="0.5" rx="2"/>
      <rect x="4" y="28" width="48" height="8" fill="white" opacity="0.6" rx="2"/>
    </g>
  </g>

  <!-- Arrows to targets -->
  <g stroke="url(#trGrad3)" stroke-width="2.5" opacity="0.55" fill="none">
    <path d="M 552 260 Q 660 200 760 160"/>
    <path d="M 552 280 L 760 280"/>
    <path d="M 552 300 Q 660 360 760 400"/>
  </g>

  <!-- Target formats (right) -->
  <g transform="translate(760, 100)">
    <rect x="0" y="0" width="200" height="56" fill="url(#trGrad3)" opacity="0.7" rx="10"/>
    <rect x="0" y="180" width="200" height="56" fill="url(#trGrad3)" opacity="0.8" rx="10"/>
    <rect x="0" y="360" width="200" height="56" fill="url(#trGrad3)" opacity="0.65" rx="10"/>
  </g>

  <!-- Message chain visualization (bottom) -->
  <g transform="translate(200, 500)">
    <rect x="0" y="0" width="72" height="36" fill="url(#trGrad2)" opacity="0.6" rx="6"/>
    <rect x="100" y="0" width="72" height="36" fill="url(#trGrad)" opacity="0.65" rx="6"/>
    <rect x="200" y="0" width="72" height="36" fill="url(#trGrad3)" opacity="0.7" rx="6"/>
    <rect x="300" y="0" width="72" height="36" fill="url(#trGrad)" opacity="0.65" rx="6"/>
    <rect x="400" y="0" width="72" height="36" fill="url(#trGrad3)" opacity="0.7" rx="6"/>
    <rect x="500" y="0" width="72" height="36" fill="url(#trGrad2)" opacity="0.6" rx="6"/>
    <g stroke="url(#trGrad)" stroke-width="2" opacity="0.4">
      <line x1="72" y1="18" x2="100" y2="18"/>
      <line x1="172" y1="18" x2="200" y2="18"/>
      <line x1="272" y1="18" x2="300" y2="18"/>
      <line x1="372" y1="18" x2="400" y2="18"/>
      <line x1="472" y1="18" x2="500" y2="18"/>
    </g>
  </g>

  <!-- Parquet / analytics box -->
  <g transform="translate(980, 260)">
    <rect x="0" y="0" width="120" height="80" fill="url(#trGrad2)" opacity="0.35" rx="8"/>
    <g opacity="0.55">
      <rect x="16" y="18" width="88" height="10" fill="url(#trGrad2)" rx="2"/>
      <rect x="16" y="36" width="72" height="10" fill="url(#trGrad2)" rx="2"/>
      <rect x="16" y="54" width="80" height="10" fill="url(#trGrad2)" rx="2"/>
    </g>
  </g>
</svg>
