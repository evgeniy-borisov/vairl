<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="edgeGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="edgeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <filter id="edgeGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- PyTorch stack (left) -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="120" height="140" fill="url(#edgeGrad)" opacity="0.85" rx="12" filter="url(#edgeGlow)"/>
    <rect x="16" y="20" width="88" height="12" fill="#fff" opacity="0.35" rx="3"/>
    <rect x="16" y="40" width="72" height="12" fill="#fff" opacity="0.28" rx="3"/>
    <rect x="16" y="60" width="80" height="12" fill="#fff" opacity="0.32" rx="3"/>
    <circle cx="60" cy="110" r="18" fill="url(#edgeGrad3)" opacity="0.75"/>
  </g>

  <!-- ONNX bridge -->
  <g transform="translate(300, 240)">
    <ellipse cx="80" cy="50" rx="70" ry="40" fill="url(#edgeGrad2)" opacity="0.35"/>
    <rect x="30" y="28" width="100" height="44" fill="url(#edgeGrad2)" opacity="0.8" rx="8"/>
    <circle cx="50" cy="50" r="8" fill="#fff" opacity="0.5"/>
    <circle cx="80" cy="50" r="8" fill="#fff" opacity="0.6"/>
    <circle cx="110" cy="50" r="8" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Browser / device (right) -->
  <g transform="translate(520, 140)">
    <rect x="0" y="0" width="320" height="220" fill="url(#edgeGrad)" opacity="0.2" rx="16"/>
    <rect x="20" y="20" width="280" height="160" fill="#1a1a2e" opacity="0.15" rx="10"/>
  </g>

  <!-- Camera viewport -->
  <g transform="translate(560, 180)">
    <rect x="0" y="0" width="200" height="120" fill="url(#edgeGrad)" opacity="0.55" rx="8"/>
    <circle cx="100" cy="60" r="36" fill="url(#edgeGrad2)" opacity="0.45"/>
    <circle cx="100" cy="60" r="22" fill="url(#edgeGrad2)" opacity="0.85" filter="url(#edgeGlow)"/>
    <rect x="168" y="8" width="24" height="16" fill="url(#edgeGrad3)" opacity="0.7" rx="3"/>
  </g>

  <!-- 28x28 grid hint -->
  <g transform="translate(800, 200)" opacity="0.7">
    <rect x="0" y="0" width="84" height="84" fill="url(#edgeGrad)" opacity="0.25" rx="6"/>
    <g stroke="#667eea" stroke-width="1" opacity="0.35">
      <line x1="28" y1="0" x2="28" y2="84"/><line x1="56" y1="0" x2="56" y2="84"/>
      <line x1="0" y1="28" x2="84" y2="28"/><line x1="0" y1="56" x2="84" y2="56"/>
    </g>
    <circle cx="42" cy="42" r="14" fill="url(#edgeGrad2)" opacity="0.9"/>
  </g>

  <!-- NN layers (bottom) -->
  <g transform="translate(200, 420)">
    <circle cx="0" cy="40" r="22" fill="url(#edgeGrad)" opacity="0.8"/>
    <circle cx="80" cy="20" r="18" fill="url(#edgeGrad)" opacity="0.65"/>
    <circle cx="80" cy="60" r="18" fill="url(#edgeGrad)" opacity="0.65"/>
    <circle cx="160" cy="40" r="26" fill="url(#edgeGrad2)" opacity="0.9" filter="url(#edgeGlow)"/>
    <g stroke="url(#edgeGrad)" stroke-width="2" opacity="0.35">
      <line x1="22" y1="40" x2="62" y2="25"/>
      <line x1="22" y1="40" x2="62" y2="55"/>
      <line x1="98" y1="28" x2="134" y2="36"/>
      <line x1="98" y1="52" x2="134" y2="44"/>
    </g>
  </g>

  <!-- Flow arrows -->
  <g stroke="url(#edgeGrad3)" stroke-width="3" opacity="0.6" fill="none">
    <line x1="220" y1="270" x2="300" y2="290"/>
    <line x1="460" y1="290" x2="540" y2="270"/>
  </g>
  <polygon points="300,290 288,284 288,296" fill="#fa709a" opacity="0.75"/>
  <polygon points="540,270 528,264 528,276" fill="#fa709a" opacity="0.75"/>

  <!-- WASM chip -->
  <g transform="translate(900, 420)" opacity="0.65">
    <rect x="0" y="0" width="100" height="64" fill="url(#edgeGrad)" opacity="0.5" rx="6"/>
    <g fill="url(#edgeGrad2)" opacity="0.8">
      <rect x="8" y="8" width="8" height="8" rx="1"/>
      <rect x="22" y="8" width="8" height="8" rx="1"/>
      <rect x="36" y="8" width="8" height="8" rx="1"/>
      <rect x="8" y="22" width="8" height="8" rx="1"/>
      <rect x="22" y="22" width="8" height="8" rx="1"/>
      <rect x="36" y="22" width="8" height="8" rx="1"/>
    </g>
  </g>
</svg>
