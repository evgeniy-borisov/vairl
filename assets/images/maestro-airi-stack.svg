<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="msGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="msGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <filter id="msGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Gateway (center) -->
  <rect x="480" y="240" width="240" height="90" fill="url(#msGrad)" opacity="0.9" rx="14" filter="url(#msGlow)"/>
  <text x="600" y="275" text-anchor="middle" fill="white" font-size="13" font-family="system-ui, sans-serif" font-weight="600">gateway</text>
  <text x="600" y="298" text-anchor="middle" fill="white" font-size="10" font-family="monospace" opacity="0.75">FastAPI À JWT</text>
  <text x="600" y="316" text-anchor="middle" fill="white" font-size="9" font-family="monospace" opacity="0.55">:7731</text>

  <!-- Microservices ring -->
  <rect x="120" y="120" width="150" height="56" fill="url(#msGrad)" opacity="0.7" rx="10"/>
  <text x="195" y="152" text-anchor="middle" fill="white" font-size="10" font-family="monospace">llm-hub</text>

  <rect x="930" y="120" width="170" height="56" fill="url(#msGrad)" opacity="0.7" rx="10"/>
  <text x="1015" y="152" text-anchor="middle" fill="white" font-size="10" font-family="monospace">chat-manager</text>

  <rect x="80" y="420" width="180" height="56" fill="url(#msGrad2)" opacity="0.75" rx="10"/>
  <text x="170" y="452" text-anchor="middle" fill="white" font-size="10" font-family="monospace">moderators</text>

  <rect x="920" y="420" width="200" height="56" fill="url(#msGrad2)" opacity="0.75" rx="10"/>
  <text x="1020" y="452" text-anchor="middle" fill="white" font-size="10" font-family="monospace">extractors</text>

  <!-- CARE layer (top) -->
  <rect x="380" y="40" width="440" height="50" fill="url(#msGrad2)" opacity="0.85" rx="10"/>
  <text x="600" y="72" text-anchor="middle" fill="white" font-size="12" font-family="system-ui" font-weight="600">MAESTRO CARE À MAGE Æ CARL Æ Memory Æ Platform</text>

  <!-- gRPC bus label -->
  <rect x="420" y="360" width="360" height="36" fill="#1a1a2e" opacity="0.15" rx="8"/>
  <text x="600" y="383" text-anchor="middle" fill="#667eea" font-size="11" font-family="monospace" opacity="0.8">mmar-ptag À gRPC À protobuf</text>

  <!-- Links -->
  <g stroke="url(#msGrad)" stroke-width="2" opacity="0.35">
    <line x1="270" y1="148" x2="480" y2="265"/>
    <line x1="930" y1="148" x2="720" y2="265"/>
    <line x1="170" y1="420" x2="520" y2="310"/>
    <line x1="1020" y1="420" x2="680" y2="310"/>
    <line x1="600" y1="90" x2="600" y2="240"/>
  </g>

  <polygon points="380,285 360,275 360,295" fill="#fa709a" opacity="0.7"/>
  <polygon points="820,285 840,275 840,295" fill="#fa709a" opacity="0.7"/>

  <text x="600" y="580" text-anchor="middle" fill="#667eea" font-size="14" font-family="system-ui, sans-serif" opacity="0.55">AIRI À MMAR À <8:@>A5@28AK À CARL DAG</text>
</svg>
