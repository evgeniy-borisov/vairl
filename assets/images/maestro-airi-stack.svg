<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="msGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="msGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="msGrad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <filter id="msGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- CARE pipeline (top): generate ? run ? memory ? evolve -->
  <g transform="translate(320, 48)">
    <circle cx="0" cy="28" r="22" fill="url(#msGrad2)" opacity="0.9" filter="url(#msGlow)"/>
    <rect x="72" y="8" width="44" height="40" fill="url(#msGrad2)" opacity="0.75" rx="8"/>
    <rect x="156" y="8" width="44" height="40" fill="url(#msGrad3)" opacity="0.8" rx="8"/>
    <circle cx="248" cy="28" r="22" fill="url(#msGrad)" opacity="0.85"/>
    <g stroke="url(#msGrad2)" stroke-width="2" opacity="0.5">
      <line x1="22" y1="28" x2="72" y2="28"/>
      <line x1="116" y1="28" x2="156" y2="28"/>
      <line x1="200" y1="28" x2="226" y2="28"/>
    </g>
    <polygon points="64,28 72,24 72,32" fill="#fa709a" opacity="0.8"/>
    <polygon points="148,28 156,24 156,32" fill="#fa709a" opacity="0.8"/>
    <polygon points="220,28 226,24 226,32" fill="#fa709a" opacity="0.8"/>
  </g>

  <!-- Gateway hub -->
  <g transform="translate(480, 228)">
    <rect x="0" y="0" width="240" height="100" fill="url(#msGrad)" opacity="0.92" rx="16" filter="url(#msGlow)"/>
    <rect x="24" y="24" width="192" height="10" fill="#fff" opacity="0.35" rx="3"/>
    <rect x="24" y="44" width="140" height="10" fill="#fff" opacity="0.28" rx="3"/>
    <rect x="24" y="64" width="168" height="10" fill="#fff" opacity="0.32" rx="3"/>
    <circle cx="200" cy="54" r="18" fill="url(#msGrad3)" opacity="0.75"/>
  </g>

  <!-- Microservice nodes -->
  <rect x="130" y="130" width="88" height="52" fill="url(#msGrad)" opacity="0.72" rx="10"/>
  <rect x="130" y="130" width="88" height="14" fill="#fff" opacity="0.2" rx="10"/>

  <rect x="980" y="120" width="96" height="52" fill="url(#msGrad)" opacity="0.7" rx="10"/>
  <rect x="980" y="120" width="96" height="14" fill="#fff" opacity="0.18" rx="10"/>

  <circle cx="170" cy="430" r="30" fill="url(#msGrad2)" opacity="0.78"/>
  <circle cx="1030" cy="440" r="28" fill="url(#msGrad2)" opacity="0.72"/>

  <rect x="90" y="500" width="120" height="44" fill="url(#msGrad)" opacity="0.55" rx="8"/>
  <rect x="990" y="510" width="110" height="44" fill="url(#msGrad3)" opacity="0.6" rx="8"/>

  <!-- gRPC mesh -->
  <g stroke="url(#msGrad)" stroke-width="2" opacity="0.32">
    <line x1="218" y1="156" x2="480" y2="268"/>
    <line x1="1028" y1="146" x2="720" y2="258"/>
    <line x1="200" y1="400" x2="520" y2="318"/>
    <line x1="1002" y1="412" x2="700" y2="308"/>
    <line x1="600" y1="76" x2="600" y2="228"/>
  </g>

  <!-- gRPC bus -->
  <rect x="380" y="368" width="440" height="8" fill="url(#msGrad)" opacity="0.2" rx="4"/>
  <g stroke="url(#msGrad3)" stroke-width="2" opacity="0.45">
    <line x1="400" y1="372" x2="800" y2="372" stroke-dasharray="10 6"/>
  </g>
  <circle cx="400" cy="372" r="5" fill="url(#msGrad3)"/>
  <circle cx="520" cy="372" r="5" fill="url(#msGrad3)" opacity="0.7"/>
  <circle cx="640" cy="372" r="5" fill="url(#msGrad3)" opacity="0.85"/>
  <circle cx="760" cy="372" r="5" fill="url(#msGrad3)"/>

  <!-- Flow arrows -->
  <polygon points="460,278 440,268 440,288" fill="#fa709a" opacity="0.75"/>
  <polygon points="740,278 760,268 760,288" fill="#fa709a" opacity="0.75"/>

  <!-- CARL DAG hint (bottom-left) -->
  <g transform="translate(260, 480)" opacity="0.65">
    <circle cx="0" cy="40" r="14" fill="url(#msGrad)" opacity="0.7"/>
    <circle cx="56" cy="16" r="12" fill="url(#msGrad3)" opacity="0.8"/>
    <circle cx="56" cy="64" r="12" fill="url(#msGrad3)" opacity="0.75"/>
    <circle cx="112" cy="40" r="16" fill="url(#msGrad)" opacity="0.9" filter="url(#msGlow)"/>
    <g stroke="url(#msGrad)" stroke-width="2" opacity="0.4">
      <line x1="14" y1="36" x2="44" y2="22"/>
      <line x1="14" y1="44" x2="44" y2="58"/>
      <line x1="68" y1="28" x2="96" y2="36"/>
      <line x1="68" y1="52" x2="96" y2="44"/>
    </g>
  </g>
</svg>
