<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sttG1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="sttG2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="sttG3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#fafbff"/>
  <!-- Input -->
  <rect x="80" y="240" width="160" height="100" rx="12" fill="url(#sttG2)" opacity="0.25" stroke="url(#sttG2)" stroke-width="2"/>
  <text x="160" y="285" text-anchor="middle" fill="#38f9d7" font-family="system-ui,sans-serif" font-size="22" font-weight="600">U</text>
  <text x="160" y="315" text-anchor="middle" fill="#666" font-family="system-ui,sans-serif" font-size="14">Input</text>
  <!-- System -->
  <rect x="480" y="200" width="240" height="180" rx="16" fill="url(#sttG1)" opacity="0.2" stroke="url(#sttG1)" stroke-width="3"/>
  <text x="600" y="285" text-anchor="middle" fill="#667eea" font-family="system-ui,sans-serif" font-size="28" font-weight="600">S</text>
  <text x="600" y="320" text-anchor="middle" fill="#666" font-family="system-ui,sans-serif" font-size="14">System</text>
  <text x="600" y="350" text-anchor="middle" fill="#888" font-family="monospace" font-size="12">y = S(u)</text>
  <!-- Output -->
  <rect x="960" y="240" width="160" height="100" rx="12" fill="url(#sttG3)" opacity="0.25" stroke="url(#sttG3)" stroke-width="2"/>
  <text x="1040" y="285" text-anchor="middle" fill="#fa709a" font-family="system-ui,sans-serif" font-size="22" font-weight="600">Y</text>
  <text x="1040" y="315" text-anchor="middle" fill="#666" font-family="system-ui,sans-serif" font-size="14">Output</text>
  <!-- arrows -->
  <path d="M240 290 L470 290" fill="none" stroke="#43e97b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M720 290 L950 290" fill="none" stroke="#fa709a" stroke-width="3" marker-end="url(#arr)"/>
  <!-- question marks for unknown -->
  <text x="160" y="420" text-anchor="middle" fill="#667eea" font-family="system-ui,sans-serif" font-size="18" opacity="0.5">? known / unknown</text>
  <text x="600" y="480" text-anchor="middle" fill="#667eea" font-family="system-ui,sans-serif" font-size="20">Analysis - Synthesis - Identification - Control</text>
  <text x="600" y="520" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="15">Systems theory task triad</text>
</svg>
