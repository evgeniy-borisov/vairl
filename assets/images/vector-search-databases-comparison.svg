<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="vg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="vg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="vgglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#fafbff"/>
  <rect x="1" y="1" width="1198" height="628" rx="4" fill="none" stroke="#e4e6f0" stroke-width="2"/>

  <circle cx="140" cy="140" r="80" fill="url(#vg1)" opacity="0.12"/>
  <circle cx="1060" cy="500" r="90" fill="url(#vg2)" opacity="0.10"/>
  <circle cx="900" cy="100" r="50" fill="url(#vg3)" opacity="0.10"/>

  <text x="600" y="62" text-anchor="middle" fill="#333" font-family="system-ui, sans-serif" font-size="28" font-weight="700">Vector Search: Chroma · Postgres · ES · ArcadeDB</text>
  <text x="600" y="96" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="14">!8AB5<=K5 B@51>20=8O · latency · hybrid · RAG</text>

  <!-- DB boxes -->
  <rect x="60" y="140" width="240" height="100" rx="14" fill="#fff" stroke="#667eea" stroke-width="2"/>
  <text x="180" y="178" text-anchor="middle" fill="#667eea" font-family="system-ui, sans-serif" font-size="16" font-weight="700">ChromaDB</text>
  <text x="180" y="202" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="12">vector only · HNSW in RAM</text>
  <text x="180" y="222" text-anchor="middle" fill="#888" font-family="system-ui, sans-serif" font-size="11">p50 ~12 ms · &lt;1M node</text>

  <rect x="330" y="140" width="240" height="100" rx="14" fill="#fff" stroke="#336791" stroke-width="2"/>
  <text x="450" y="178" text-anchor="middle" fill="#336791" font-family="system-ui, sans-serif" font-size="16" font-weight="700">PostgreSQL</text>
  <text x="450" y="202" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="12">pgvector + tsvector / SQL</text>
  <text x="450" y="222" text-anchor="middle" fill="#888" font-family="system-ui, sans-serif" font-size="11">p50 ~518 ms · ACID</text>

  <rect x="600" y="140" width="240" height="100" rx="14" fill="#fff" stroke="#f5a623" stroke-width="2"/>
  <text x="720" y="178" text-anchor="middle" fill="#c47d00" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Elasticsearch</text>
  <text x="720" y="202" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="12">BM25 + dense kNN + RRF</text>
  <text x="720" y="222" text-anchor="middle" fill="#888" font-family="system-ui, sans-serif" font-size="11">p50 ~15 ms · scale-out</text>

  <rect x="870" y="140" width="270" height="100" rx="14" fill="#fff" stroke="#764ba2" stroke-width="2"/>
  <text x="1005" y="178" text-anchor="middle" fill="#764ba2" font-family="system-ui, sans-serif" font-size="16" font-weight="700">ArcadeDB</text>
  <text x="1005" y="202" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="12">LSM + JVector · graph + SQL</text>
  <text x="1005" y="222" text-anchor="middle" fill="#888" font-family="system-ui, sans-serif" font-size="11">312 ms @ 1M · INT8</text>

  <!-- Latency chart area -->
  <rect x="80" y="280" width="1040" height="280" rx="18" fill="#ffffff" stroke="url(#vg1)" stroke-width="2" filter="url(#vgglow)"/>
  <text x="600" y="318" text-anchor="middle" fill="#667eea" font-family="system-ui, sans-serif" font-size="16" font-weight="700">kNN latency (top-10, 500K1M vectors, 5121024 dim)</text>

  <!-- bars: relative heights -->
  <text x="200" y="360" text-anchor="middle" fill="#555" font-family="system-ui, sans-serif" font-size="11">pgvector HNSW</text>
  <rect x="160" y="370" width="80" height="120" rx="6" fill="url(#vg2)"/>
  <text x="200" y="510" text-anchor="middle" fill="#333" font-family="system-ui, sans-serif" font-size="13" font-weight="600">~5 ms</text>

  <text x="360" y="360" text-anchor="middle" fill="#555" font-family="system-ui, sans-serif" font-size="11">ChromaDB</text>
  <rect x="320" y="390" width="80" height="100" rx="6" fill="#667eea" opacity="0.85"/>
  <text x="360" y="510" text-anchor="middle" fill="#333" font-family="system-ui, sans-serif" font-size="13" font-weight="600">~12 ms</text>

  <text x="520" y="360" text-anchor="middle" fill="#555" font-family="system-ui, sans-serif" font-size="11">Elasticsearch</text>
  <rect x="480" y="385" width="80" height="105" rx="6" fill="#f5a623" opacity="0.85"/>
  <text x="520" y="510" text-anchor="middle" fill="#333" font-family="system-ui, sans-serif" font-size="13" font-weight="600">~15 ms</text>

  <text x="680" y="360" text-anchor="middle" fill="#555" font-family="system-ui, sans-serif" font-size="11">ArcadeDB INT8</text>
  <rect x="640" y="375" width="80" height="115" rx="6" fill="#764ba2" opacity="0.85"/>
  <text x="680" y="510" text-anchor="middle" fill="#333" font-family="system-ui, sans-serif" font-size="13" font-weight="600">312 ms</text>

  <text x="880" y="360" text-anchor="middle" fill="#555" font-family="system-ui, sans-serif" font-size="11">hybrid RRF</text>
  <rect x="840" y="400" width="80" height="90" rx="6" fill="url(#vg3)" opacity="0.9"/>
  <text x="880" y="510" text-anchor="middle" fill="#333" font-family="system-ui, sans-serif" font-size="13" font-weight="600">ES / Arcade</text>

  <text x="600" y="545" text-anchor="middle" fill="#888" font-family="system-ui, sans-serif" font-size="11">@85=B8@K 87 ?C1;8G=KE 15=G<0@:>2 20252026; A<. <5B>4>;>38N 2 AB0BL5</text>
</svg>
