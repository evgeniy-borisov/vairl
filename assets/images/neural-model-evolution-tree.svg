  <text x="600" y="92" text-anchor="middle" fill="#666" font-family="system-ui,sans-serif" font-size="15">Not a timeline  a branching tree</text>

  <!-- Semicircle tree arc -->
  <path d="M 200 420 A 400 400 0 0 1 1000 420" fill="none" stroke="url(#evg1)" stroke-width="4" opacity="0.5"/>
  <circle cx="600" cy="420" r="8" fill="#333"/>
  <line x1="600" y1="420" x2="280" y2="300" stroke="#43e97b" stroke-width="2"/>
  <line x1="600" y1="420" x2="450" y2="260" stroke="#667eea" stroke-width="2"/>
