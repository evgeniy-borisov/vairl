  <text x="980" y="248" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">1957 ’ 2023</text>

  <text x="600" y="560" text-anchor="middle" fill="#667eea" font-family="system-ui,sans-serif" font-size="14" font-weight="600">semicircle tree | borrow graph | PCA clusters</text>
