  <text x="220" y="155" text-anchor="middle" fill="#667eea" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Influence graph</text>
  <circle cx="160" cy="200" r="10" fill="#43e97b"/>
  <circle cx="220" cy="185" r="10" fill="#667eea"/>
  <circle cx="280" cy="200" r="10" fill="#fa709a"/>
  <path d="M170 200 L208 188" stroke="#888" marker-end="url(#arr)"/>
  <path d="M230 188 L268 198" stroke="#888"/>

  <!-- Time clusters -->
  <rect x="880" y="130" width="200" height="120" rx="10" fill="#fff" stroke="#e4e6f0" stroke-width="1.5"/>
  <text x="980" y="155" text-anchor="middle" fill="#667eea" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Time-ordered clusters</text>
  <rect x="910" y="175" width="35" height="55" rx="4" fill="#43e97b" opacity="0.35"/>
  <rect x="955" y="190" width="35" height="40" rx="4" fill="#667eea" opacity="0.35"/>
