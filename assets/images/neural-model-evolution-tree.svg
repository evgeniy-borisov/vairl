  <line x1="600" y1="420" x2="920" y2="300" stroke="#fee140" stroke-width="2"/>
  <circle cx="280" cy="300" r="14" fill="url(#evg2)"/>
  <circle cx="450" cy="260" r="14" fill="url(#evg1)"/>
  <circle cx="600" cy="240" r="14" fill="url(#evg1)"/>
  <circle cx="750" cy="260" r="14" fill="url(#evg3)"/>
  <circle cx="920" cy="300" r="14" fill="url(#evg3)"/>

