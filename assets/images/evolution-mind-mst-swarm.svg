    <circle cx="80" cy="40" r="16" fill="url(#emsG2)" opacity="0.75"/>
    <circle cx="160" cy="-10" r="18" fill="url(#emsG2)" opacity="0.85"/>
    <circle cx="240" cy="50" r="15" fill="url(#emsG2)" opacity="0.7"/>
    <circle cx="320" cy="10" r="17" fill="url(#emsG2)" opacity="0.8"/>
    <circle cx="400" cy="45" r="16" fill="url(#emsG2)" opacity="0.75"/>
    <circle cx="480" cy="0" r="18" fill="url(#emsG2)" opacity="0.85"/>
    <circle cx="560" cy="35" r="15" fill="url(#emsG2)" opacity="0.7"/>
    <circle cx="640" cy="5" r="17" fill="url(#emsG2)" opacity="0.8"/>
