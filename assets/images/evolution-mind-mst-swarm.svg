      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="emsG2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#fafbff"/>
  <!-- MST levels -->
  <g transform="translate(120,100)">
    <rect x="0" y="0" width="960" height="50" rx="8" fill="url(#emsG1)" opacity="0.15" stroke="#667eea" stroke-width="1.5"/>
    <text x="20" y="32" fill="#667eea" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Level N - metasystem</text>
    <rect x="0" y="70" width="960" height="50" rx="8" fill="url(#emsG1)" opacity="0.12" stroke="#764ba2" stroke-width="1.5"/>
    <text x="20" y="102" fill="#764ba2" font-family="system-ui,sans-serif" font-size="14">Level N-1</text>
    <rect x="0" y="140" width="960" height="50" rx="8" fill="url(#emsG1)" opacity="0.09" stroke="#667eea" stroke-width="1.5"/>
    <text x="20" y="172" fill="#667eea" font-family="system-ui,sans-serif" font-size="14">Level N-2 - mind</text>
    <path d="M480 50 L480 70 M480 120 L480 140" stroke="#667eea" stroke-width="2" opacity="0.4"/>
    <text x="500" y="65" fill="#888" font-size="12">MST up</text>
