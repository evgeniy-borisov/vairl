<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="afg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="afg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="afg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <marker id="afArrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#667eea"/>
    </marker>
    <filter id="afglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Light base: visible on dark theme site background -->
  <rect width="1200" height="630" fill="#fafbff"/>
  <rect x="1" y="1" width="1198" height="628" rx="4" fill="none" stroke="#e4e6f0" stroke-width="2"/>

  <!-- Decorative blobs -->
  <circle cx="180" cy="140" r="100" fill="url(#afg1)" opacity="0.12"/>
  <circle cx="1020" cy="500" r="110" fill="url(#afg2)" opacity="0.10"/>
  <circle cx="950" cy="120" r="60" fill="url(#afg3)" opacity="0.10"/>

  <!-- Title -->
  <text x="600" y="72" text-anchor="middle" fill="#333" font-family="system-ui, sans-serif" font-size="32" font-weight="700">Agent Fundamentals</text>
  <text x="600" y="108" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="16">RAG | Context | Skills | MCP | Landscape</text>

  <!-- Center hub: Agent loop -->
  <circle cx="600" cy="330" r="78" fill="url(#afg1)" opacity="0.22" stroke="url(#afg1)" stroke-width="3" filter="url(#afglow)"/>
  <circle cx="600" cy="330" r="52" fill="#ffffff" stroke="url(#afg1)" stroke-width="2"/>
  <text x="600" y="324" text-anchor="middle" fill="#667eea" font-family="system-ui, sans-serif" font-size="15" font-weight="700">AGENT</text>
  <text x="600" y="346" text-anchor="middle" fill="#764ba2" font-family="system-ui, sans-serif" font-size="12" font-weight="600">LOOP</text>

  <!-- RAG -->
  <rect x="90" y="250" width="175" height="105" rx="14" fill="#ffffff" stroke="url(#afg2)" stroke-width="2.5"/>
  <text x="177" y="290" text-anchor="middle" fill="#2a9d6a" font-family="system-ui, sans-serif" font-size="20" font-weight="700">RAG</text>
  <text x="177" y="316" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="12">retrieve + generate</text>
  <text x="177" y="338" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">vector DB</text>
  <line x1="265" y1="302" x2="518" y2="330" stroke="#43e97b" stroke-width="2.5" marker-end="url(#afArrow)" opacity="0.85"/>

  <!-- Context window -->
  <rect x="935" y="250" width="175" height="105" rx="14" fill="#ffffff" stroke="url(#afg3)" stroke-width="2.5"/>
  <text x="1022" y="290" text-anchor="middle" fill="#c45c26" font-family="system-ui, sans-serif" font-size="18" font-weight="700">CONTEXT</text>
  <text x="1022" y="316" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="12">window + memory</text>
  <text x="1022" y="338" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">tokens</text>
  <line x1="935" y1="302" x2="682" y2="330" stroke="#fa709a" stroke-width="2.5" opacity="0.85"/>

  <!-- Skills -->
  <rect x="90" y="430" width="175" height="105" rx="14" fill="#ffffff" stroke="url(#afg1)" stroke-width="2.5"/>
  <text x="177" y="472" text-anchor="middle" fill="#667eea" font-family="system-ui, sans-serif" font-size="20" font-weight="700">SKILLS</text>
  <text x="177" y="498" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="12">SKILL.md packages</text>
  <text x="177" y="520" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">procedures</text>
  <line x1="265" y1="470" x2="518" y2="390" stroke="#667eea" stroke-width="2.5" opacity="0.7"/>

  <!-- MCP -->
  <rect x="455" y="455" width="290" height="105" rx="14" fill="#ffffff" stroke="url(#afg1)" stroke-width="2.5"/>
  <text x="600" y="497" text-anchor="middle" fill="#5a4d9e" font-family="system-ui, sans-serif" font-size="20" font-weight="700">MCP SERVERS</text>
  <text x="600" y="523" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="12">tools | resources | prompts</text>
  <text x="600" y="545" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">JSON-RPC</text>
  <line x1="600" y1="455" x2="600" y2="408" stroke="#667eea" stroke-width="2.5" opacity="0.7"/>

  <!-- Agent labels row -->
  <text x="600" y="580" text-anchor="middle" fill="#667eea" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Pi | Aider | Codex | OpenCode | g3</text>
</svg>
