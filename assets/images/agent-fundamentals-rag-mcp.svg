<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="afg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="afg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="afg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="afglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#0a0a12"/>
  <circle cx="200" cy="160" r="120" fill="url(#afg1)" opacity="0.15"/>
  <circle cx="1000" cy="480" r="140" fill="url(#afg2)" opacity="0.12"/>

  <!-- Agent loop -->
  <circle cx="600" cy="315" r="70" fill="url(#afg1)" filter="url(#afglow)"/>
  <text x="600" y="310" text-anchor="middle" fill="white" font-size="14" font-family="system-ui,sans-serif" font-weight="700">AGENT</text>
  <text x="600" y="330" text-anchor="middle" fill="white" font-size="11" font-family="system-ui,sans-serif" opacity="0.9">LOOP</text>

  <!-- RAG -->
  <rect x="120" y="240" width="160" height="90" rx="12" fill="#14141f" stroke="url(#afg2)" stroke-width="2"/>
  <text x="200" y="275" text-anchor="middle" fill="#43e97b" font-size="13" font-family="system-ui,sans-serif" font-weight="600">RAG</text>
  <text x="200" y="298" text-anchor="middle" fill="#9898a8" font-size="10" font-family="system-ui,sans-serif">retrieve + generate</text>
  <line x1="280" y1="285" x2="530" y2="315" stroke="#43e97b" stroke-width="2" opacity="0.6"/>

  <!-- Context -->
  <rect x="920" y="240" width="160" height="90" rx="12" fill="#14141f" stroke="url(#afg3)" stroke-width="2"/>
  <text x="1000" y="275" text-anchor="middle" fill="#fee140" font-size="13" font-family="system-ui,sans-serif" font-weight="600">CONTEXT</text>
  <text x="1000" y="298" text-anchor="middle" fill="#9898a8" font-size="10" font-family="system-ui,sans-serif">window + memory</text>
  <line x1="920" y1="285" x2="670" y2="315" stroke="#fee140" stroke-width="2" opacity="0.6"/>

  <!-- MCP -->
  <rect x="470" y="470" width="260" height="90" rx="12" fill="#14141f" stroke="url(#afg1)" stroke-width="2"/>
  <text x="600" y="505" text-anchor="middle" fill="#7b9aff" font-size="13" font-family="system-ui,sans-serif" font-weight="600">MCP SERVERS</text>
  <text x="600" y="528" text-anchor="middle" fill="#9898a8" font-size="10" font-family="system-ui,sans-serif">tools · skills · integrations</text>
  <line x1="600" y1="470" x2="600" y2="385" stroke="#7b9aff" stroke-width="2" opacity="0.6"/>

  <!-- Skills -->
  <rect x="120" y="470" width="160" height="90" rx="12" fill="#14141f" stroke="#667eea" stroke-width="2"/>
  <text x="200" y="505" text-anchor="middle" fill="#a0b0ff" font-size="13" font-family="system-ui,sans-serif" font-weight="600">SKILLS</text>
  <text x="200" y="528" text-anchor="middle" fill="#9898a8" font-size="10" font-family="system-ui,sans-serif">SKILL.md packages</text>
  <line x1="280" y1="500" x2="470" y2="420" stroke="#667eea" stroke-width="2" opacity="0.5"/>

  <text x="600" y="80" text-anchor="middle" fill="white" font-size="28" font-family="system-ui,sans-serif" font-weight="700">Agent Fundamentals</text>
  <text x="600" y="115" text-anchor="middle" fill="#9898a8" font-size="14" font-family="system-ui,sans-serif">RAG · Context · Skills · MCP · Landscape</text>
</svg>
