---
layout: default
---

<article class="post">
    <header class="post-header">
        {% if page.image %}
        <div class="post-image">
            <img src="{{ page.image | relative_url }}" alt="" />
        </div>
        {% endif %}
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-date">{% if page.lang == "ru" %}{{ page.date | date: "%d %B %Y, %H:%M" }} MSK{% else %}{{ page.date | date: "%B %d, %Y, %H:%M" }} MSK{% endif %}</p>
    </header>
    
    <div class="post-content">
        {{ content }}
    </div>
    
    <footer class="post-footer">
        <a href="{{ '/blog/' | relative_url }}" class="back-link">← back to blog</a>
    </footer>
</article>
